    <style>
        :root {
            /* Тусклая темная палитра */
            --bg: #10141d;
            --card-bg: #1b222c;
            --text: #cbd5e1;
            --accent: #334155;
            --hover-accent: #475569;
            --glow: rgba(56, 189, 248, 0.05);
        }

        body {
            margin: 0;
            background-color: var(--bg);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
        }

        .container {
            width: 100%;
            max-width: 320px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .link {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text);
            background-color: var(--card-bg);
            border: 1px solid var(--accent);
            transition: all 0.25s ease;
            font-size: 15px;
            letter-spacing: 0.3px;
        }

        .link:hover {
            background-color: var(--accent);
            border-color: var(--hover-accent);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px var(--glow);
        }

        .link:active {
            transform: scale(0.98);
        }

        /* Тонкая надпись снизу для завершенности */
        .footer {
            margin-top: 10px;
            font-size: 11px;
            text-align: center;
            opacity: 0.4;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
